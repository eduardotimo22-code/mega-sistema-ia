# ============================================
# SOFIA.CONFIG.YAML
# Configuracion de tu agente de voz con IA
# Edita este archivo con los datos de tu cliente
# ============================================

version: "1.0"  # No tocar — para actualizaciones futuras

# --- DATOS DEL NEGOCIO ---
business:
  name: "Seminuevos Cozumel"
  industry: "seminuevos"                   # Template base usado
  timezone: "America/Cancun"
  phone: ""                                # Pendiente — se llena con credenciales Twilio
  address: "Av. Juárez entre 65 Bis, Cozumel, Quintana Roo"
  website: "https://www.facebook.com/profile.php?id=61554829800011"
  hours: "Lunes a Sábado 9:00-19:00"

# --- AGENTE DE VOZ ---
agent:
  name: "Sofia"
  voice_id: "11labs-Hailey-Latin-America-Spanish-localized"               # ID de voz (Retell te da opciones al crear el agente)
  language: "es-419"
  personality: "amable, profesional"

# --- LLAMADAS SALIENTES (OUTBOUND) ---
outbound:
  enabled: true
  schedule: "09:00-17:00"
  max_daily_calls: 20
  days:
    - "lun"
    - "mar"
    - "mie"
    - "jue"
    - "vie"

# --- CRM (Base de datos en Notion) ---
crm:
  product_name: "Vehículos"
  product_fields:
    - name: "Vehículo"
      type: "title"
    - name: "Precio"
      type: "number"
      format: "dollar"
    - name: "Marca"
      type: "select"
    - name: "Modelo"
      type: "rich_text"
    - name: "Año"
      type: "number"
    - name: "Kilometraje"
      type: "number"
    - name: "Color"
      type: "rich_text"
    - name: "Transmisión"
      type: "select"
      options: ["Automático", "Manual"]
    - name: "Estado"
      type: "select"
      options: ["Disponible", "Apartado", "Vendido"]
  lead_extra_fields:
    - name: "Vehículo de interés"
      type: "rich_text"
    - name: "Presupuesto máximo"
      type: "number"
      format: "dollar"
    - name: "Tipo de pago"
      type: "select"
      options: ["Contado", "Crédito", "Enganche y mensualidades"]
    - name: "Urgencia"
      type: "select"
      options: ["Inmediata", "1-2 semanas", "1 mes", "Solo explorando"]

# --- APARIENCIA DEL DASHBOARD ---
branding:
  primary_color: "#06b6d4"
  logo_text: "Seminuevos Cozumel"
  dashboard_title: "Panel de Control — Seminuevos Cozumel"
